name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15-arm64

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3
        with:
          repository: CrocketaMalvada/croketachat.apple
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐦 Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: ARM64

      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🔧 Parchear Xcode signing en pbxproj
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          echo "=== ANTES del parche ==="
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN|PROVISIONING" "$PBXPROJ" || echo "No se encontraron líneas"
          
          # Parche ampliado - captura cualquier valor
          LC_ALL=C sed -i "" 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          LC_ALL=C sed -i "" 's/CODE_SIGN_STYLE = .*;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          LC_ALL=C sed -i "" 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          LC_ALL=C sed -i "" 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBXPROJ"
          
          echo "=== DESPUÉS del parche ==="
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN|PROVISIONING" "$PBXPROJ" || echo "No se encontraron líneas"

      - name: 🍏 Pod install
        run: pod install
        working-directory: ios

      - name: 🚀 Compilar iOS (sin firma)
        run: flutter build ios --release --no-codesign

      - name: 🎁 Empaquetar .ipa
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../CroketaChat.ipa Payload

      - name: ☁️ Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: CroketaChat
          path: CroketaChat.ipa
