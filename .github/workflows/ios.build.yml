name: Build iOS Premium

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: 🐦 Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🍏 Generar archivos base de iOS
        run: |
          # Borramos cualquier rastro previo de iOS para empezar limpios
          rm -rf ios
          # Creamos el proyecto directamente en la raíz con el ID correcto
          flutter create --platforms=ios --org com.croketa.chatpremium .

      - name: 🔐 Inyectar Permisos de Apple (Magia pura)
        # El "|| true" hace que si el permiso ya existe, no tire error y siga adelante felizmente.
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'CroketaChat necesita la cámara para fotos efímeras.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'CroketaChat necesita acceso a la galería para tu foto de perfil.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'CroketaChat necesita el micrófono para enviar notas de voz.'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.croketa.chatpremium" ios/Runner/Info.plist
      - name: 📦 Instalar dependencias
        run: flutter pub get

      - name: 🚀 Compilar iOS
        run: flutter build ios --release --no-codesign

      - name: 🎁 Empaquetar a formato .ipa
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r CroketaChat_Premium.ipa Payload

      - name: ☁️ Subir la App lista para instalar
        uses: actions/upload-artifact@v4
        with:
          name: CroketaChat-iOS-App
          path: CroketaChat_Premium.ipa
